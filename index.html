<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khanh Huyen Beautiful - Form Filler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Quicksand', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 30%, #f0fdf4 60%, #ecfdf5 100%);
    color: #1e293b;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #059669, #10b981, #34d399);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(16,185,129,0.3);
  }
  .header::before {
    content: '';
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
    animation: shimmer 8s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(10%, 10%); }
  }
  .header-content { position: relative; z-index: 1; }
  .avatar-wrap {
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    overflow: hidden; margin: 0 auto 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .brand {
    font-family: 'Pacifico', cursive;
    font-size: 26px; color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    margin-bottom: 4px;
  }
  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.5px;
  }

  .container { max-width: 700px; margin: 0 auto; padding: 16px; }

  .card {
    background: #fff;
    border: 1px solid #d1fae5;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(16,185,129,0.08);
  }
  .field { margin-bottom: 12px; }
  label {
    font-size: 13px; color: #059669;
    display: block; margin-bottom: 5px;
    font-weight: 600; letter-spacing: 0.3px;
  }
  input, textarea, select {
    width: 100%; padding: 11px 14px;
    border: 2px solid #d1fae5;
    border-radius: 10px;
    background: #f0fdf4;
    color: #1e293b;
    font-size: 14px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 500;
    transition: all 0.25s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #10b981;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
  }
  textarea { height: 50px; resize: vertical; }
  .hint { font-size: 11px; color: #6ee7b7; margin-top: 4px; font-weight: 500; }

  button {
    padding: 12px 24px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Quicksand', sans-serif;
    transition: all 0.25s; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
  button:active { transform: translateY(0); }

  #scanBtn {
    width: 100%;
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff;
    box-shadow: 0 3px 12px rgba(16,185,129,0.3);
  }
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  .actions button { flex: 1; }
  #fillBtn {
    background: linear-gradient(135deg, #0d9488, #14b8a6);
    color: #fff;
    box-shadow: 0 3px 10px rgba(20,184,166,0.3);
  }
  #submitBtn {
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff;
    box-shadow: 0 3px 10px rgba(16,185,129,0.3);
  }
  #stopBtn {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: #fff; display: none;
    box-shadow: 0 3px 10px rgba(239,68,68,0.3);
  }

  .q-card {
    background: #fff;
    border: 1px solid #d1fae5;
    border-radius: 14px;
    padding: 14px; margin-bottom: 10px;
    box-shadow: 0 1px 6px rgba(16,185,129,0.06);
    border-left: 4px solid #10b981;
  }
  .q-title { font-size: 13px; font-weight: 700; color: #064e3b; margin-bottom: 3px; }
  .q-type { font-size: 11px; color: #10b981; margin-bottom: 8px; font-weight: 600; }
  .q-option { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
  .q-option input { width: 60px; flex-shrink: 0; padding: 7px 8px; font-size: 13px; text-align: center; }
  .q-option span { flex: 1; color: #334155; }

  #status {
    text-align: center; margin-top: 14px;
    font-size: 13px; padding: 10px 14px;
    border-radius: 12px; font-weight: 600;
  }
  .status-ok { color: #059669; background: rgba(16,185,129,0.1); border: 1px solid #a7f3d0; }
  .status-err { color: #dc2626; background: rgba(239,68,68,0.08); border: 1px solid #fecaca; }
  .status-run { color: #d97706; background: rgba(245,158,11,0.08); border: 1px solid #fde68a; }

  .progress-bar {
    width: 100%; height: 8px;
    background: #d1fae5;
    border-radius: 4px; margin-top: 10px;
    overflow: hidden; display: none;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #10b981, #34d399);
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }

  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }

  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: #6ee7b7;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .footer img {
    width: 22px; height: 22px; border-radius: 50%;
    vertical-align: middle; margin-right: 4px;
    border: 1px solid #a7f3d0;
  }

  @media (max-width: 600px) {
    .container { padding: 10px; }
    .brand { font-size: 22px; }
    .actions { flex-direction: column; }
    .row { flex-direction: column; gap: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="avatar-wrap">
      <img src="avatar.jpg" alt="Khanh Huyen">
    </div>
    <div class="brand">Khanh Huyen Beautiful</div>
    <p class="subtitle">Google Form Auto Filler</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="field">
      <label>Link Google Form</label>
      <input id="formUrl" placeholder="https://docs.google.com/forms/d/e/..." />
    </div>
    <button id="scanBtn">Quet Form</button>
  </div>

  <div id="questions"></div>

  <div id="actionsCard" class="card" style="display:none">
    <div class="row">
      <div class="field">
        <label>So lan gui</label>
        <input id="repeatCount" type="number" value="1" min="1" max="10000" />
      </div>
      <div class="field">
        <label>Delay min (ms)</label>
        <input id="delayMin" type="number" value="800" min="0" max="30000" />
      </div>
      <div class="field">
        <label>Delay max (ms)</label>
        <input id="delayMax" type="number" value="3000" min="0" max="30000" />
        <div class="hint">Random giua min-max, giong nguoi that</div>
      </div>
    </div>
    <div class="actions">
      <button id="fillBtn">Gui 1 Lan</button>
      <button id="submitBtn">Gui Nhieu Lan</button>
      <button id="stopBtn">Dung Lai</button>
    </div>
    <div class="progress-bar"><div class="fill"></div></div>
  </div>

  <div id="status"></div>
</div>

<div class="footer">
  <img src="avatar.jpg" alt=""> Khanh Huyen Beautiful
</div>

<script>
const CORS_PROXIES = [
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)
];

let formData = null;
let formAction = null;
let formPageCount = 1;
let sw = null;

const $ = id => document.getElementById(id);

function setStatus(text, type) {
  const el = $('status');
  el.textContent = text;
  el.className = type === 'ok' ? 'status-ok' : type === 'err' ? 'status-err' : 'status-run';
}

function setProgress(pct) {
  const bar = document.querySelector('.progress-bar');
  const fill = bar.querySelector('.fill');
  bar.style.display = pct >= 0 ? 'block' : 'none';
  fill.style.width = pct + '%';
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    sw = reg;
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ action: 'status' });
    }
  });

  navigator.serviceWorker.addEventListener('message', (e) => {
    const msg = e.data;
    if (msg.type === 'progress') {
      const pct = Math.round((msg.current / msg.total) * 100);
      setProgress(pct);
      setStatus('Dang gui ' + msg.current + '/' + msg.total + ' (OK: ' + msg.ok + ', Loi: ' + msg.fail + ')', 'run');
      showRunningUI(true);
    } else if (msg.type === 'done') {
      setProgress(100);
      setStatus('Xong! ' + msg.ok + '/' + msg.total + ' thanh cong' + (msg.fail ? ', ' + msg.fail + ' loi' : ''), 'ok');
      showRunningUI(false);
    } else if (msg.type === 'status' && msg.running) {
      setStatus('Dang chay nen... ' + (msg.current || 0) + '/' + (msg.total || '?') + ' (OK: ' + (msg.ok || 0) + ')', 'run');
      const pct = msg.total ? Math.round((msg.current / msg.total) * 100) : 0;
      setProgress(pct);
      showRunningUI(true);
    }
  });
}

function showRunningUI(isRunning) {
  if ($('actionsCard').style.display === 'none') return;
  $('stopBtn').style.display = isRunning ? 'block' : 'none';
  $('submitBtn').style.display = isRunning ? 'none' : '';
  $('fillBtn').style.display = isRunning ? 'none' : '';
}

async function fetchWithProxy(url) {
  for (const makeProxy of CORS_PROXIES) {
    try {
      const proxyUrl = makeProxy(url);
      const res = await fetch(proxyUrl);
      if (res.ok) {
        const text = await res.text();
        if (text.includes('FB_PUBLIC_LOAD_DATA_')) return text;
      }
    } catch (e) {}
  }
  throw new Error('Khong fetch duoc form. Thu lai sau.');
}

function parseForm(html) {
  const questions = [];

  let formActionUrl = null;
  const actionMatch = html.match(/action="(https:\/\/docs\.google\.com\/forms\/[^"]+\/formResponse)"/);
  if (actionMatch) {
    formActionUrl = actionMatch[1];
  }

  const dataMatch = html.match(/FB_PUBLIC_LOAD_DATA_\s*=\s*(.*?);\s*<\/script>/s);
  if (!dataMatch) return { questions, formAction: formActionUrl };

  const data = JSON.parse(dataMatch[1]);
  const items = data[1][1];

  for (const item of items) {
    if (!item[4]) continue;
    const title = item[1] || '';
    const itemType = item[3];
    const field = item[4][0];
    const entryId = field[0];
    const options = (field[1] || []).map(o => o[0]);

    if (itemType === 0) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'text', options: [] });
    } else if (itemType === 1) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'paragraph', options: [] });
    } else if (itemType === 2) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'radio', options });
    } else if (itemType === 3) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'dropdown', options });
    } else if (itemType === 4) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'checkbox', options });
    } else if (itemType === 5) {
      const low = field[1] ? field[1][0][0] : 1;
      const high = field[1] ? field[1][0][1] : 5;
      const opts = [];
      for (let v = low; v <= high; v++) opts.push(String(v));
      questions.push({ title, entryId: 'entry.' + entryId, type: 'scale', options: opts, min: low, max: high });
    } else if (itemType === 7) {
      const columns = options;
      for (const rowField of item[4]) {
        const rowEntryId = rowField[0];
        const rowLabel = Array.isArray(rowField[3]) ? rowField[3][0] : (rowField[3] || '');
        questions.push({
          title: title + ' → ' + rowLabel,
          entryId: 'entry.' + rowEntryId,
          type: 'radio',
          options: columns
        });
      }
    }
  }

  let pageCount = 1;
  for (const item of items) {
    if (item[3] === 8) pageCount++;
  }

  return { questions, formAction: formActionUrl, pageCount };
}

function renderQuestions(questions) {
  const div = $('questions');
  div.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';

    let typeLabel = '', configHTML = '';

    if (q.type === 'text' || q.type === 'paragraph') {
      typeLabel = q.type === 'text' ? '📝 Dien ngan' : '📝 Dien dai';
      configHTML = '<div class="field">' +
        '<label>Noi dung (moi dong = 1 mau random)</label>' +
        '<textarea class="q-input" data-idx="' + i + '" placeholder="Dong 1&#10;Dong 2&#10;Dong 3"></textarea>' +
        '</div>';
    } else if (q.type === 'radio' || q.type === 'checkbox' || q.type === 'dropdown') {
      const labels = { radio: '⭕ Chon 1', checkbox: '☑️ Chon nhieu', dropdown: '📋 Dropdown' };
      typeLabel = labels[q.type];
      const defPct = Math.round(100 / q.options.length);
      configHTML = q.options.map((opt, oi) =>
        '<div class="q-option">' +
          '<input type="number" class="q-pct" data-idx="' + i + '" data-oi="' + oi + '" value="' + defPct + '" min="0" max="100"/>' +
          '<span>% ' + opt + '</span>' +
        '</div>'
      ).join('');
    } else if (q.type === 'scale') {
      typeLabel = '📊 Thang diem (' + q.min + '-' + q.max + ')';
      const defPct = Math.round(100 / q.options.length);
      configHTML = q.options.map((opt, oi) =>
        '<div class="q-option">' +
          '<input type="number" class="q-pct" data-idx="' + i + '" data-oi="' + oi + '" value="' + defPct + '" min="0" max="100"/>' +
          '<span>% Diem ' + opt + '</span>' +
        '</div>'
      ).join('');
    }

    card.innerHTML =
      '<div class="q-title">Q' + (i + 1) + ': ' + q.title + '</div>' +
      '<div class="q-type">' + typeLabel + ' | ' + q.entryId + '</div>' +
      configHTML;
    div.appendChild(card);
  });
}

function getConfigs() {
  return formData.map((q, i) => {
    if (q.type === 'text' || q.type === 'paragraph') {
      const ta = document.querySelector('.q-input[data-idx="' + i + '"]');
      return { values: ta ? ta.value.split('\n').map(l => l.trim()).filter(l => l) : [] };
    }
    const pcts = document.querySelectorAll('.q-pct[data-idx="' + i + '"]');
    return { percentages: Array.from(pcts).map(p => parseInt(p.value) || 0) };
  });
}

function pickByPct(options, pcts) {
  const total = pcts.reduce((a, b) => a + b, 0);
  if (total === 0) return options[0];
  const r = Math.random() * total;
  let sum = 0;
  for (let i = 0; i < pcts.length; i++) {
    sum += pcts[i];
    if (r < sum) return options[i];
  }
  return options[options.length - 1];
}

function pickMulti(options, pcts) {
  const sel = [];
  for (let i = 0; i < options.length; i++) {
    if (Math.random() * 100 < pcts[i]) sel.push(options[i]);
  }
  return sel.length ? sel : [options[0]];
}

function genAnswer(q, cfg) {
  if (q.type === 'text' || q.type === 'paragraph') {
    return (!cfg.values || !cfg.values.length) ? '' : cfg.values[Math.floor(Math.random() * cfg.values.length)];
  }
  if (q.type === 'checkbox') return pickMulti(q.options, cfg.percentages || []);
  return pickByPct(q.options, cfg.percentages || []);
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function submitOnce(configs) {
  return new Promise((resolve) => {
    var frameName = 'sf_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    var iframe = document.createElement('iframe');
    iframe.name = frameName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    var form = document.createElement('form');
    form.method = 'POST';
    form.action = formAction;
    form.target = frameName;
    form.style.display = 'none';

    for (var i = 0; i < formData.length; i++) {
      var q = formData[i];
      var answer = genAnswer(q, configs[i]);
      if (q.type === 'checkbox' && Array.isArray(answer)) {
        answer.forEach(function(a) {
          var inp = document.createElement('input');
          inp.type = 'hidden'; inp.name = q.entryId; inp.value = a;
          form.appendChild(inp);
        });
      } else {
        var inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = q.entryId; inp.value = answer;
        form.appendChild(inp);
      }
    }

    var addHidden = function(name, val) {
      var inp = document.createElement('input');
      inp.type = 'hidden'; inp.name = name; inp.value = val;
      form.appendChild(inp);
    };
    addHidden('fvv', '1');
    var ph = [];
    for (var p = 0; p < formPageCount; p++) ph.push(p);
    addHidden('pageHistory', ph.join(','));
    addHidden('fbzx', String(Date.now() * -1 + Math.floor(Math.random() * 1000000)));

    document.body.appendChild(form);
    form.submit();

    setTimeout(function() {
      form.remove();
      iframe.remove();
      resolve();
    }, 1500);
  });
}

// SCAN
$('scanBtn').addEventListener('click', async () => {
  let url = $('formUrl').value.trim();
  if (!url) { setStatus('Nhap link Google Form!', 'err'); return; }

  if (!url.includes('/viewform')) {
    url = url.replace(/\/edit.*$/, '/viewform');
    if (!url.endsWith('/viewform')) url = url.replace(/\/?$/, '/viewform');
  }

  setStatus('Dang doc form...', 'run');
  try {
    const html = await fetchWithProxy(url);
    const result = parseForm(html);

    if (!result.formAction) {
      const idMatch = url.match(/\/d\/e\/([^/]+)/);
      if (idMatch) {
        formAction = 'https://docs.google.com/forms/d/e/' + idMatch[1] + '/formResponse';
      }
    } else {
      formAction = result.formAction;
    }

    if (!result.questions.length) {
      setStatus('Khong tim thay cau hoi nao', 'err');
      return;
    }

    formData = result.questions;
    formPageCount = result.pageCount || 1;
    renderQuestions(formData);
    $('actionsCard').style.display = 'block';
    setStatus('Tim thay ' + formData.length + ' cau hoi (' + formPageCount + ' trang)', 'ok');
  } catch (e) {
    setStatus('Loi: ' + e.message, 'err');
  }
});

// FILL 1
$('fillBtn').addEventListener('click', async () => {
  if (!formData || !formAction) return;
  setStatus('Dang gui 1 lan...', 'run');
  try {
    await submitOnce(getConfigs());
    setStatus('Xong! Da gui 1 lan thanh cong', 'ok');
  } catch (e) {
    setStatus('Loi: ' + e.message, 'err');
  }
});

// FILL MULTI
let running = false;
$('submitBtn').addEventListener('click', async () => {
  if (!formData || !formAction) return;
  const count = parseInt($('repeatCount').value) || 1;
  const delayMin = parseInt($('delayMin').value) || 0;
  const delayMax = parseInt($('delayMax').value) || 0;
  const configs = getConfigs();

  running = true;
  showRunningUI(true);
  setProgress(0);

  let ok = 0, fail = 0;
  for (let n = 0; n < count; n++) {
    if (!running) break;
    try {
      await submitOnce(configs);
      ok++;
    } catch (e) {
      fail++;
    }
    const pct = Math.round(((n + 1) / count) * 100);
    setProgress(pct);
    setStatus('Dang gui ' + (n + 1) + '/' + count + ' (OK: ' + ok + ', Loi: ' + fail + ')', 'run');

    if (running && n < count - 1) {
      const delay = randInt(Math.min(delayMin, delayMax), Math.max(delayMin, delayMax));
      await new Promise(r => setTimeout(r, delay));
    }
  }

  running = false;
  showRunningUI(false);
  setStatus('Xong! ' + ok + '/' + count + ' thanh cong' + (fail ? ', ' + fail + ' loi' : ''), 'ok');
});

// STOP
$('stopBtn').addEventListener('click', () => {
  running = false;
  showRunningUI(false);
  setStatus('Da dung', 'err');
});
</script>
</body>
</html>
