<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Form Auto Filler</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f23; color: #eee; min-height: 100vh; }
  .container { max-width: 700px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; color: #4ecca3; margin-bottom: 6px; font-size: 24px; }
  .subtitle { text-align: center; color: #666; font-size: 12px; margin-bottom: 20px; }
  .card { background: #1a1a2e; border: 1px solid #16213e; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .field { margin-bottom: 10px; }
  label { font-size: 13px; color: #aaa; display: block; margin-bottom: 4px; font-weight: 500; }
  input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #eee; font-size: 14px; transition: border-color 0.2s; }
  input:focus, textarea:focus { outline: none; border-color: #4ecca3; }
  textarea { height: 50px; resize: vertical; }
  .hint { font-size: 11px; color: #555; margin-top: 3px; }
  button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  #scanBtn { width: 100%; background: #4ecca3; color: #1a1a2e; }
  .actions { display: flex; gap: 10px; margin-top: 10px; }
  .actions button { flex: 1; }
  #fillBtn { background: #e94560; color: #fff; }
  #submitBtn { background: #f59e0b; color: #1a1a2e; }
  #stopBtn { background: #555; color: #fff; display: none; }
  .q-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .q-title { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 3px; }
  .q-type { font-size: 11px; color: #4ecca3; margin-bottom: 8px; }
  .q-option { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
  .q-option input { width: 60px; flex-shrink: 0; padding: 6px 8px; font-size: 13px; }
  .q-option span { flex: 1; }
  #status { text-align: center; margin-top: 12px; font-size: 13px; padding: 8px; border-radius: 8px; }
  .status-ok { color: #4ecca3; background: rgba(78,204,163,0.1); }
  .status-err { color: #e94560; background: rgba(233,69,96,0.1); }
  .status-run { color: #f59e0b; background: rgba(245,158,11,0.1); }
  .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 8px; overflow: hidden; display: none; }
  .progress-bar .fill { height: 100%; background: #4ecca3; border-radius: 3px; transition: width 0.3s; width: 0%; }
  .sep { border-top: 1px solid #222; margin: 12px 0; }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  @media (max-width: 600px) {
    .container { padding: 12px; }
    h1 { font-size: 20px; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>GG Form Auto Filler</h1>
  <p class="subtitle">Dan link Google Form → Quet → Set ti le → Submit 1000 lan</p>

  <div class="card">
    <div class="field">
      <label>Link Google Form</label>
      <input id="formUrl" placeholder="https://docs.google.com/forms/d/e/..." />
    </div>
    <button id="scanBtn">QUET FORM</button>
  </div>

  <div id="questions"></div>

  <div id="actionsCard" class="card" style="display:none">
    <div class="row">
      <div class="field">
        <label>So lan gui</label>
        <input id="repeatCount" type="number" value="1" min="1" max="10000" />
      </div>
      <div class="field">
        <label>Delay (ms)</label>
        <input id="delayMs" type="number" value="150" min="0" max="5000" />
        <div class="hint">0 = nhanh nhat, 150-300 = an toan</div>
      </div>
    </div>
    <div class="actions">
      <button id="fillBtn">GUI 1 LAN</button>
      <button id="submitBtn">GUI NHIEU LAN</button>
      <button id="stopBtn">DUNG</button>
    </div>
    <div class="progress-bar"><div class="fill"></div></div>
  </div>

  <div id="status"></div>
</div>

<script>
const CORS_PROXIES = [
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)
];

let formData = null;
let formAction = null;
let running = false;

const $ = id => document.getElementById(id);

function setStatus(text, type) {
  const el = $('status');
  el.textContent = text;
  el.className = type === 'ok' ? 'status-ok' : type === 'err' ? 'status-err' : 'status-run';
}

function setProgress(pct) {
  const bar = document.querySelector('.progress-bar');
  const fill = bar.querySelector('.fill');
  bar.style.display = pct >= 0 ? 'block' : 'none';
  fill.style.width = pct + '%';
}

async function fetchWithProxy(url) {
  for (const makeProxy of CORS_PROXIES) {
    try {
      const proxyUrl = makeProxy(url);
      const res = await fetch(proxyUrl);
      if (res.ok) {
        const text = await res.text();
        if (text.includes('FB_PUBLIC_LOAD_DATA_')) return text;
      }
    } catch (e) {}
  }
  throw new Error('Khong fetch duoc form. Thu lai sau.');
}

function parseForm(html) {
  const questions = [];

  let formActionUrl = null;
  const actionMatch = html.match(/action="(https:\/\/docs\.google\.com\/forms\/[^"]+\/formResponse)"/);
  if (actionMatch) {
    formActionUrl = actionMatch[1];
  }

  const dataMatch = html.match(/FB_PUBLIC_LOAD_DATA_\s*=\s*(.*?);\s*<\/script>/s);
  if (!dataMatch) return { questions, formAction: formActionUrl };

  const data = JSON.parse(dataMatch[1]);
  const items = data[1][1];

  for (const item of items) {
    if (!item[4]) continue;
    const title = item[1] || '';
    const itemType = item[3];
    const field = item[4][0];
    const entryId = field[0];
    const options = (field[1] || []).map(o => o[0]);

    if (itemType === 0) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'text', options: [] });
    } else if (itemType === 1) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'paragraph', options: [] });
    } else if (itemType === 2) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'radio', options });
    } else if (itemType === 3) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'dropdown', options });
    } else if (itemType === 4) {
      questions.push({ title, entryId: 'entry.' + entryId, type: 'checkbox', options });
    } else if (itemType === 5) {
      const low = field[1] ? field[1][0][0] : 1;
      const high = field[1] ? field[1][0][1] : 5;
      const opts = [];
      for (let v = low; v <= high; v++) opts.push(String(v));
      questions.push({ title, entryId: 'entry.' + entryId, type: 'scale', options: opts, min: low, max: high });
    } else if (itemType === 7) {
      const columns = options;
      for (const rowField of item[4]) {
        const rowEntryId = rowField[0];
        const rowLabel = rowField[3] || '';
        questions.push({
          title: title + ' → ' + rowLabel,
          entryId: 'entry.' + rowEntryId,
          type: 'radio',
          options: columns
        });
      }
    }
  }

  return { questions, formAction: formActionUrl };
}

function renderQuestions(questions) {
  const div = $('questions');
  div.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';

    let typeLabel = '', configHTML = '';

    if (q.type === 'text' || q.type === 'paragraph') {
      typeLabel = q.type === 'text' ? '📝 Dien ngan' : '📝 Dien dai';
      configHTML = `<div class="field">
        <label>Noi dung (moi dong = 1 mau random)</label>
        <textarea class="q-input" data-idx="${i}" placeholder="Dong 1&#10;Dong 2&#10;Dong 3"></textarea>
      </div>`;
    } else if (q.type === 'radio' || q.type === 'checkbox' || q.type === 'dropdown') {
      const labels = { radio: '⭕ Chon 1', checkbox: '☑️ Chon nhieu', dropdown: '📋 Dropdown' };
      typeLabel = labels[q.type];
      const defPct = Math.round(100 / q.options.length);
      configHTML = q.options.map((opt, oi) =>
        `<div class="q-option">
          <input type="number" class="q-pct" data-idx="${i}" data-oi="${oi}" value="${defPct}" min="0" max="100"/>
          <span>% ${opt}</span>
        </div>`
      ).join('');
    } else if (q.type === 'scale') {
      typeLabel = '📊 Thang diem (' + q.min + '-' + q.max + ')';
      const defPct = Math.round(100 / q.options.length);
      configHTML = q.options.map((opt, oi) =>
        `<div class="q-option">
          <input type="number" class="q-pct" data-idx="${i}" data-oi="${oi}" value="${defPct}" min="0" max="100"/>
          <span>% Diem ${opt}</span>
        </div>`
      ).join('');
    }

    card.innerHTML = `
      <div class="q-title">Q${i + 1}: ${q.title}</div>
      <div class="q-type">${typeLabel} | ${q.entryId}</div>
      ${configHTML}
    `;
    div.appendChild(card);
  });
}

function pickByPct(options, pcts) {
  const total = pcts.reduce((a, b) => a + b, 0);
  if (total === 0) return options[0];
  const r = Math.random() * total;
  let sum = 0;
  for (let i = 0; i < pcts.length; i++) {
    sum += pcts[i];
    if (r < sum) return options[i];
  }
  return options[options.length - 1];
}

function pickMulti(options, pcts) {
  const sel = [];
  for (let i = 0; i < options.length; i++) {
    if (Math.random() * 100 < pcts[i]) sel.push(options[i]);
  }
  return sel.length ? sel : [options[0]];
}

function getConfigs() {
  return formData.map((q, i) => {
    if (q.type === 'text' || q.type === 'paragraph') {
      const ta = document.querySelector(`.q-input[data-idx="${i}"]`);
      return { values: ta ? ta.value.split('\n').map(l => l.trim()).filter(l => l) : [] };
    }
    const pcts = document.querySelectorAll(`.q-pct[data-idx="${i}"]`);
    return { percentages: Array.from(pcts).map(p => parseInt(p.value) || 0) };
  });
}

function genAnswer(q, cfg) {
  if (q.type === 'text' || q.type === 'paragraph') {
    return (!cfg.values || !cfg.values.length) ? '' : cfg.values[Math.floor(Math.random() * cfg.values.length)];
  }
  if (q.type === 'checkbox') return pickMulti(q.options, cfg.percentages || []);
  return pickByPct(q.options, cfg.percentages || []);
}

async function submitOnce(configs) {
  const params = new URLSearchParams();
  for (let i = 0; i < formData.length; i++) {
    const q = formData[i];
    const answer = genAnswer(q, configs[i]);
    if (q.type === 'checkbox' && Array.isArray(answer)) {
      answer.forEach(a => params.append(q.entryId, a));
    } else {
      params.append(q.entryId, answer);
    }
  }
  await fetch(formAction, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: params.toString(),
    mode: 'no-cors'
  });
}

// SCAN
$('scanBtn').addEventListener('click', async () => {
  let url = $('formUrl').value.trim();
  if (!url) { setStatus('Nhap link Google Form!', 'err'); return; }

  if (!url.includes('/viewform')) {
    url = url.replace(/\/edit.*$/, '/viewform');
    if (!url.endsWith('/viewform')) url = url.replace(/\/?$/, '/viewform');
  }

  setStatus('Dang doc form...', 'run');
  try {
    const html = await fetchWithProxy(url);
    const result = parseForm(html);

    if (!result.formAction) {
      const idMatch = url.match(/\/d\/e\/([^/]+)/);
      if (idMatch) {
        formAction = 'https://docs.google.com/forms/d/e/' + idMatch[1] + '/formResponse';
      }
    } else {
      formAction = result.formAction;
    }

    if (!result.questions.length) {
      setStatus('Khong tim thay cau hoi nao', 'err');
      return;
    }

    formData = result.questions;
    renderQuestions(formData);
    $('actionsCard').style.display = 'block';
    setStatus('Tim thay ' + formData.length + ' cau hoi', 'ok');
  } catch (e) {
    setStatus('Loi: ' + e.message, 'err');
  }
});

// FILL 1
$('fillBtn').addEventListener('click', async () => {
  if (!formData || !formAction) return;
  setStatus('Dang gui 1 lan...', 'run');
  try {
    await submitOnce(getConfigs());
    setStatus('Xong! Da gui 1 lan thanh cong', 'ok');
  } catch (e) {
    setStatus('Loi: ' + e.message, 'err');
  }
});

// FILL MULTI
$('submitBtn').addEventListener('click', async () => {
  if (!formData || !formAction) return;
  const count = parseInt($('repeatCount').value) || 1;
  const delay = parseInt($('delayMs').value) || 150;
  const configs = getConfigs();

  running = true;
  $('stopBtn').style.display = 'block';
  $('submitBtn').style.display = 'none';
  $('fillBtn').style.display = 'none';
  setProgress(0);

  let ok = 0, fail = 0;

  for (let n = 0; n < count; n++) {
    if (!running) break;
    try {
      await submitOnce(configs);
      ok++;
    } catch (e) {
      fail++;
    }
    const pct = Math.round(((n + 1) / count) * 100);
    setProgress(pct);
    setStatus('Dang gui ' + (n + 1) + '/' + count + ' (OK: ' + ok + ', Loi: ' + fail + ')', 'run');

    if (delay > 0 && n < count - 1) {
      await new Promise(r => setTimeout(r, delay));
    }
  }

  running = false;
  $('stopBtn').style.display = 'none';
  $('submitBtn').style.display = '';
  $('fillBtn').style.display = '';
  setStatus('Xong! ' + ok + '/' + count + ' thanh cong' + (fail ? ', ' + fail + ' loi' : ''), 'ok');
});

// STOP
$('stopBtn').addEventListener('click', () => {
  running = false;
  setStatus('Da dung', 'err');
});
</script>
</body>
</html>
